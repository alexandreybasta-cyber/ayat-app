        // Shuffle utility
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // Get next batch of verses (never repeats until pool exhausted)

            const pool = MOOD_VERSE_POOLS[moodKey];

            const available = pool.map((v, i) => ({ ...v, idx: i })).filter(v => !shown.includes(v.idx));

                // Reset pool
                state.shownIndices[moodKey] = [];
                return getNextVerses(moodKey, count);

            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            state.shownIndices[moodKey] = [...shown, ...selected.map(v => v.idx)];

            return selected.map(({ surah, ayah }) => ({ surah, ayah }));
        }

        // API
        async function fetchVerse(surah, ayah) {
            try {
                const [arabicRes, englishRes] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/quran-uthmani`),
                    fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/sahih`)
                ]);

                const [arabicData, englishData] = await Promise.all([
                    arabicRes.json(),
                    englishRes.json()
                ]);

                return {
                    surah,
                    ayah,
                    arabic: arabicData.data.text,
                    translation: englishData.data.text,
                    reference: `${arabicData.data.surah.englishName} ${surah}:${ayah}`,
                    audioUrl: `${AUDIO_BASE_URL}${String(surah).padStart(3, '0')}${String(ayah).padStart(3, '0')}.mp3`
                };
            } catch (error) {
                console.error(`Error fetching verse ${surah}:${ayah}:`, error);
                return null;
            }
        }

        async function loadVersesForMood(moodKey) {
            const versesToFetch = getNextVerses(moodKey);
            const results = await Promise.all(versesToFetch.map(v => fetchVerse(v.surah, v.ayah)));
            state.verses = results.filter(v => v !== null);
            renderVerses();
        }

        // Navigation
        function showMoodPage(moodKey) {
            state.currentMood = moodKey;
            const mood = MOODS[moodKey];

            document.getElementById('page-moods').classList.remove('active');
            document.getElementById('page-verses').classList.add('active');

            document.getElementById('detailIcon').textContent = mood.icon;
            document.getElementById('detailName').textContent = mood.name;
            document.getElementById('detailDesc').textContent = mood.description;

            document.getElementById('versesContainer').innerHTML = `
                <div class="loading-placeholder">
                    <div class="loading-spinner"></div>
                    <p>Loading verses...</p>
                </div>
            `;

            window.scrollTo({ top: 0, behavior: 'instant' });
            loadVersesForMood(moodKey);
        }

        function goBack() {
            document.getElementById('page-verses').classList.remove('active');
            document.getElementById('page-moods').classList.add('active');
            state.currentMood = null;

            // Stop any playing audio
            if (state.currentAudio) {
                state.currentAudio.pause();
                state.currentAudio = null;
            }

            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function refreshCurrentMood() {
            if (!state.currentMood) return;

            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');

            loadVersesForMood(state.currentMood).then(() => {
                btn.classList.remove('loading');
            });
        }

        // Render
        function renderVerses() {
            const container = document.getElementById('versesContainer');

            if (state.verses.length === 0) {
                container.innerHTML = `
                    <div class="error-message">
                        <p>Failed to load verses. Please try refreshing.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="verses-grid">
                    ${state.verses.map((v, i) => `
                        <div class="verse-card" style="animation-delay: ${i * 0.08}s">
                            <div class="verse-arabic">${v.arabic}</div>
                            <div class="verse-translation">"${v.translation}"</div>
                            <div class="verse-footer">
                                <span class="verse-reference">${v.reference}</span>
                                <button class="audio-btn" onclick="playAudio('${v.audioUrl}', this)">
                                    <span class="play-icon">&#9654;</span>
                                    <span>Play</span>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderMoodCards() {
            const grid = document.getElementById('moodGrid');
            grid.innerHTML = Object.entries(MOODS).map(([key, mood]) => `
                <div class="mood-card" onclick="showMoodPage('${key}')">
                    <span class="mood-card-icon">${mood.icon}</span>
                    <div class="mood-card-name">${mood.name}</div>
                    <div class="mood-card-desc">${mood.description}</div>
                </div>
            `).join('');
        }

        // Audio
        function playAudio(url, btn) {
            if (state.currentAudio) {
                state.currentAudio.pause();
                state.currentAudio = null;
                if (state.playingBtn) {
                    state.playingBtn.classList.remove('playing');
                    state.playingBtn.querySelector('.play-icon').innerHTML = '&#9654;';
                    state.playingBtn.querySelector('span:last-child').textContent = 'Play';
                }
            }

            if (state.playingBtn === btn) {
                state.playingBtn = null;
                return;
            }

            const audio = new Audio(url);
            state.currentAudio = audio;
            state.playingBtn = btn;

            btn.classList.add('playing');
            btn.querySelector('.play-icon').innerHTML = '&#9208;';
            btn.querySelector('span:last-child').textContent = 'Playing...';

            audio.play().catch(err => {
                console.error('Audio playback error:', err);
                btn.classList.remove('playing');
                btn.querySelector('.play-icon').innerHTML = '&#9654;';
                btn.querySelector('span:last-child').textContent = 'Play';
            });

            audio.onended = () => {
                btn.classList.remove('playing');
                btn.querySelector('.play-icon').innerHTML = '&#9654;';
                btn.querySelector('span:last-child').textContent = 'Play';
                state.currentAudio = null;
                state.playingBtn = null;
            };
        }

        // Handle browser back button
        window.addEventListener('popstate', (e) => {
            if (state.currentMood) {
                goBack();
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderMoodCards();
        });
    </script>
</body>
</html>
